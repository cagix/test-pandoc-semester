name: Update Handout

on:
    schedule:
        # scheduled every day at 5:30 and 17:30 UTC
        - cron:  "30 5,17 * * *"
    # triggered manually
    workflow_dispatch:

env:
    LECTURE_REPO: cagix/test-pandoc-lecture
    LECTURE_BRANCH: _handout

jobs:
    sync_lecture:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            actions: read

        steps:
            - name: Checkout semester-repo (fully)
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Checkout external lecture-repo (branch LECTURE_BRANCH, last commit)
              uses: actions/checkout@v6
              with:
                  repository: ${{ env.LECTURE_REPO }}
                  fetch-depth: 1
                  ref: ${{ env.LECTURE_BRANCH }}
                  path: ${{ env.LECTURE_BRANCH }}

            - name: Retrieve last commit message from lecture-repo
              id: message
              working-directory: ${{ env.LECTURE_BRANCH }}
              run: |
                  msg="$(git log -n 1 --pretty=format:'%s (%ad %h)' --date=short 2>/dev/null || echo 'unversioned')"
                  msg=${msg//\"/}
                  msg=${msg//\'/}
                  msg=${msg//\`/}
                  msg=${msg//\$/}
                  echo "COMMIT_MESSAGE=$msg" >> "$GITHUB_OUTPUT"

            - name: Copy files over
              run: |
                  find . -mindepth 1 -maxdepth 1  \
                    ! -name '.git'                \
                    ! -name "$LECTURE_BRANCH"     \
                    -exec rm -rf {} +

                  mv "$LECTURE_BRANCH"/* .
                  rm -rf "$LECTURE_BRANCH"

            - name: Commit and push
              env:
                  COMMIT_MESSAGE: ${{ steps.message.outputs.COMMIT_MESSAGE }}
              run: |
                  if [[ -n "$(git status --porcelain)" ]]; then
                    git config user.name "cagix"
                    git config user.email "cagix@users.noreply.github.com"

                    git add -f .
                    git commit -m "$COMMIT_MESSAGE"
                    git push
                  else
                    echo "no changes to push"
                  fi
